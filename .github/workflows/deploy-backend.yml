name: Deploy Backend to AWS Lambda

# Manual trigger only — go to Actions tab → select this workflow → "Run workflow"
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build with SAM
        working-directory: backend
        run: sam build

      # GRADIUM_API_KEY required. Optional GRADIUM_VOICE_ID / GRADIUM_API_REGION — if VOICE_ID secret is unset, the
      # default here MUST match template.yaml GradiumVoiceId (deploy always passes parameter-overrides).
      - name: Deploy to AWS
        working-directory: backend
        env:
          GRADIUM_API_KEY: ${{ secrets.GRADIUM_API_KEY }}
          GRADIUM_VOICE_ID: ${{ secrets.GRADIUM_VOICE_ID }}
          GRADIUM_API_REGION: ${{ secrets.GRADIUM_API_REGION }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT: ${{ secrets.LANGCHAIN_PROJECT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
        run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name cardio-backend \
            --capabilities CAPABILITY_IAM \
            --region us-east-1 \
            --resolve-s3 \
            --resolve-image-repos \
            --parameter-overrides "GradiumApiKey=${GRADIUM_API_KEY} GradiumVoiceId=${GRADIUM_VOICE_ID:-OceLYI_PPbqsdgdV} GradiumApiRegion=${GRADIUM_API_REGION:-us} GoogleApiKey=${GOOGLE_API_KEY} LangchainApiKey=${LANGCHAIN_API_KEY} LangchainProject=${LANGCHAIN_PROJECT:-orsushealth-dr-bear} SupabaseUrl=${SUPABASE_URL} SupabaseServiceRoleKey=${SUPABASE_SERVICE_ROLE_KEY} AppApiKey=${APP_API_KEY}"
