AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Heart Disease Prediction API — FastAPI on Lambda

Parameters:
  GradiumApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Gradium API key (set via GitHub secret GRADIUM_API_KEY)
  GradiumVoiceId:
    Type: String
    Default: 'OceLYI_PPbqsdgdV'
  GradiumApiRegion:
    Type: String
    Default: 'us'
    AllowedValues:
      - us
      - eu
  GoogleApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Google Gemini API key for Dr. Bear chat agent
  LangchainApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: LangSmith API key for tracing
  LangchainProject:
    Type: String
    Default: 'orsushealth-dr-bear'
    Description: LangSmith project name
  SupabaseUrl:
    Type: String
    Default: ''
    Description: Supabase project URL
  SupabaseServiceRoleKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Supabase service role key (server-side only)
  AppApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Secret key required for frontend to access this backend

Globals:
  Function:
    Timeout: 90
    MemorySize: 512

Resources:
  HeartDiseasePredictFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      CodeUri: .
      Environment:
        Variables:
          GRADIUM_API_KEY: !Ref GradiumApiKey
          GRADIUM_VOICE_ID: !Ref GradiumVoiceId
          GRADIUM_API_REGION: !Ref GradiumApiRegion
          GOOGLE_API_KEY: !Ref GoogleApiKey
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_API_KEY: !Ref LangchainApiKey
          LANGCHAIN_PROJECT: !Ref LangchainProject
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceRoleKey
          APP_API_KEY: !Ref AppApiKey
          # Enable streaming in the Web Adapter
          AWS_LWA_INVOKE_MODE: response_stream
      # Enable Lambda Function URL for Streaming
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: latest

  GeneratePdfFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/generate-pdf/
      Handler: handler.handler
      Runtime: nodejs18.x
      Architectures:
        - x86_64
      MemorySize: 1024
      Timeout: 30
      Layers:
        - arn:aws:lambda:us-east-1:764866452798:layer:chrome-aws-lambda:50
      Environment:
        Variables:
          NODE_ENV: production
      FunctionUrlConfig:
        AuthType: NONE

Outputs:
  ApiUrl:
    Description: Lambda Function URL
    Value: !GetAtt HeartDiseasePredictFunctionUrl.FunctionUrl
  GeneratePdfUrl:
    Description: PDF generation Lambda Function URL
    Value: !GetAtt GeneratePdfFunctionUrl.FunctionUrl
  HeartDiseasePredictFunction:
    Description: Lambda function ARN
    Value: !GetAtt HeartDiseasePredictFunction.Arn
  GeneratePdfFunction:
    Description: PDF generation Lambda function ARN
    Value: !GetAtt GeneratePdfFunction.Arn
